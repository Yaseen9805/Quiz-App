<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="quiz-container">

        <!-- Header -->
        <div class="quiz-header">
            <h1>Quiz App</h1>
            <div class="quiz-info">
                <span id="score">Score: 0</span>
                <span id="timer">Time: 10s</span>
            </div>
        </div>

        <!-- Question -->
        <div class="question-box">
            <h2 id="question"></h2>
        </div>

        <!-- Options -->
        <div class="options">
            <button class="option-btn">Option 1</button>
            <button class="option-btn">Option 2</button>
            <button class="option-btn">Option 3</button>
            <button class="option-btn">Option 4</button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="next-btn">Next</button>
            <button id="restart-btn">Restart</button>
        </div>

        <!-- Result -->
        <div class="result-box hidden">
            <h2>Your Final Score: <span id="final-score">0</span></h2>
            <h3>High Score: <span id="high-score">0</span></h3>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
